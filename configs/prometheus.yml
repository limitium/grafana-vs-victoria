global:
  scrape_interval: 10s
  evaluation_interval: 10s
  external_labels:
    cluster: 'test-cluster'
    replica: '0'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'metrics_load'
    static_configs:
      - targets: ['metrics_load:9100']
    scrape_interval: 10s

  # Optional: remote_write to VictoriaMetrics (disabled for apples-to-apples comparison)
  # remote_write:
  #   - url: 'http://victoriametrics:8428/api/v1/write'



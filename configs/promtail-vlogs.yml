server:
  http_listen_port: 9081
  grpc_listen_port: 0

positions:
  filename: /tmp/positions-vlogs.yaml

clients:
  # Note: Promtail doesn't natively support VictoriaLogs API
  # VictoriaLogs uses a different ingestion format than Loki
  # For this benchmark, we'll note this limitation in the report
  - url: http://victorialogs:9428/insert/logs
    # This will fail, but we'll track errors in the report

scrape_configs:
  - job_name: logs_load
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'stream'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service'
      # Only scrape logs from logs_load container
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        regex: 'logs_load'
        action: keep

